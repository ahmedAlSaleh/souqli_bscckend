name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-backend-main
      cancel-in-progress: false
    env:
      RUN_DB_MIGRATIONS: ${{ secrets.RUN_DB_MIGRATIONS }}
      RUN_ADMIN_SEEDER: ${{ secrets.RUN_ADMIN_SEEDER }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          fingerprint: ${{ secrets.VPS_HOST_FINGERPRINT }}
          script_stop: true
          script: |
            set -euo pipefail

            cd /var/www/souqli_bscckend
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            npm ci --omit=dev

            if [ "${RUN_DB_MIGRATIONS:-0}" = "1" ] && npm run | grep -q "migrate"; then
              npm run migrate
            fi

            if [ "${RUN_ADMIN_SEEDER:-0}" = "1" ] && npm run | grep -q "seed:admin"; then
              npm run seed:admin
            fi

            if [ -f ecosystem.config.cjs ]; then
              pm2 startOrReload ecosystem.config.cjs --env production
            else
              pm2 reload souqli-api || pm2 start src/server.js --name souqli-api
            fi

            pm2 save
            pm2 describe souqli-api >/dev/null
            curl -fsS http://127.0.0.1:3000/ >/dev/null
            api_status=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://127.0.0.1:3000/api/auth/login -H "Content-Type: application/json" -d '{"email":"__healthcheck__","password":"__healthcheck__"}')
            case "$api_status" in
              200|400|401) ;;
              *)
                echo "ERROR: Backend health check failed with status $api_status"
                exit 1
                ;;
            esac
